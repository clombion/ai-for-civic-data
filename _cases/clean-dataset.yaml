id: clean-dataset
title: Cleaning a Messy Dataset
shortDesc: Standardise values, resolve inconsistencies, detect outliers and document every transformation — with a full audit trail.
context: Datasets from government portals, FOI responses or web scraping are rarely clean. The key principle — AI should never touch the data directly. It should produce code and decisions that a human can read, approve, and trace before a single value is changed.
mode: pipeline
pipelineTags: [clean, verify]
topicTags: [data cleaning, CSV, government data]
material: a messy dataset
hasSkill: true
skillDesc: Generates a Python/pandas cleaning script from a data profile and specification, executes it, and outputs an audit log with one row per transformation.
skillFile: dataset-cleaning-skill.md

risks:
  - risk:
      title: Undocumented transformations
      body: AI cleans the data directly — changes are invisible, unauditable, and irreversible.
    good:
      title: All transformations logged before execution
      body: "AI generates a script. The script runs and logs every transformation — row, column, before, after, reason — before writing a single cell."
  - risk:
      title: Cleaning rules invented by AI
      body: AI decides what 'clean' means, importing assumptions from training data that may not match this context.
    good:
      title: Human writes the specification first
      body: AI implements a specification written by the analyst. The cleaning rules are authored by a human — not generated by AI.
  - risk:
      title: Original data modified
      body: When AI cleans in-place, the ability to trace a finding back to the raw source is lost.
    good:
      title: Original file structurally untouchable
      body: The script writes only to a new output file. The original cannot be modified — not by instruction, but by the code's structure.
  - risk:
      title: Ambiguity silently resolved
      body: "Is '0' a missing value or valid zero? AI decides silently, embedding a judgment no human ever made."
    good:
      title: Ambiguous cases surfaced as REVIEW comments
      body: The script adds # REVIEW comments for cases the specification doesn't cover, using the conservative choice until a human decides.

principles:
  - name: Objective
    tag: "Define 'clean' in concrete, checkable terms for this dataset"
    body: "Not 'clean this dataset' but 'standardise company_name to title case, resolve the 47 known aliases to canonical names per alias-table.csv, convert date columns to ISO 8601, and flag rows where revenue is negative.' Every rule must be stated before AI is involved."
    ex1:
      lbl: Specification format
      txt: "Column: company_name\nRule: title case, strip punctuation, resolve aliases per alias-table.csv\nEdge cases: 'N/A' or blank → flag as MISSING, do not drop"

  - name: Output shape
    tag: Two outputs — cleaned file and audit log
    body: The cleaned dataset and the audit log are both required. The audit log is what makes the cleaning verifiable and the analysis defensible. Without it you cannot explain why a value changed, or challenge a finding that depends on a cleaning decision.
    ex1:
      lbl: Audit log columns
      txt: "row_index | column | original_value | new_value | transformation_type | reason"
    warn: A cleaning script that produces only the clean file is incomplete. The audit log is not optional.

  - name: Atomic steps
    tag: "Profile → specify → generate → review → execute"
    body: Five steps, none skippable. Profile the raw data. Write the specification from the profile. Ask AI to generate the script. Read the script. Then execute on a 10% sample first. The most important step is reading the script — this is where you catch rules AI implemented wrongly before they touch the data.
    ex1:
      lbl: Required sequence
      txt: "1. df.describe() + df.dtypes + df.isnull().sum()\n2. Write specification\n3. AI generates clean.py\n4. Human reads clean.py\n5. Execute on 10% sample first"

  - name: Reasoning trace
    tag: Every transformation must carry a reason
    body: Ask AI to add a comment above every transformation block explaining the decision, and a reason field in the audit log. A transformation without a reason is a decision without accountability.
    ex1:
      lbl: Comment format
      txt: "# Rule: standardise date format to ISO 8601\n# Source: specification line 4\n# Edge case: entries with time → truncate to date only\ndf['date'] = pd.to_datetime(df['date']).dt.date"

  - name: Human review
    tag: Read the script before it runs
    body: Read the generated script before it runs. Every transformation must match the specification. Any transformation you didn't specify is a flag. After execution — re-profile and compare to baseline. Any unexpected change requires investigation.
    warn: Never run AI-generated data transformation code you have not read. The whole point of asking AI to generate code rather than transform directly is that you can read it first.

prompt: |
  Generate a Python pandas cleaning script. Do not clean data yourself — generate code a human will read before running.

  # Data profile
  [PASTE: df.describe(), df.dtypes, df.isnull().sum(), df[col].value_counts() for categorical columns]

  # Cleaning specification
  [PASTE: one rule per column, with edge cases noted]

  # Requirements
  — NEVER modify the original file; write only to clean_output.csv
  — Produce audit_log.csv: row_index | column | original_value | new_value | transformation_type | reason
  — Add a comment above every transformation block: rule, source in spec, edge case handling
  — End with a summary print: rows processed, transformations applied, nulls remaining
  — For any case not covered by specification, add # REVIEW and implement the conservative option
